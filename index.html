<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis de Riesgos con Nmap y CVSS 3.1</title>

<style>
body{
    font-family: Arial, sans-serif;

.container{

    margin:auto;
    padding:25px;

}

    color:#1d2b44;

<body>

<div class="container">

<h1>Análisis de Riesgos con Nmap y CVSS 3.1</h1>

<div id="resultado"></div>

</div>

<script>

let texto=document.getElementById("nmap").value;

let resultado=`

</script>

</html>
